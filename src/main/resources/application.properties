spring.application.name=simple-auth

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create/update the schema from the @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:authdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT settings ---
# Secret must be at least 32 chars (256 bits) for the HS256 algorithm
app.jwt.secret=change-me-this-is-a-demo-secret-key-please-rotate-in-prod
app.jwt.expiration-ms=3600000
server.port=8081
